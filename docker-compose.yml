services:
  postgres:
    image: postgres:16-alpine
    container_name: cdd-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cdd
    ports:
      - "5432:5432"
    volumes:
      - cdd-postgres-data:/var/lib/postgresql/data

volumes:
  cdd-postgres-data:
