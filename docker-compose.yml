services:
  postgres:
    image: postgres:16-alpine
    container_name: cdd-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cdd
    ports:
      - "5432:5432"
    volumes:
      - cdd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: cdd-redis
    ports:
      - "6379:6379"
    volumes:
      - cdd-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cdd-postgres-data:
  cdd-redis-data:
